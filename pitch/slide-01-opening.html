<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>Predix - Opening</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #09090b;
    color: #f4f4f5;
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .logo {
    height: 80px;
    margin-bottom: 48px;
    object-fit: contain;
    clip-path: inset(10% 0);
  }

  .tagline {
    font-size: 36px;
    font-weight: 300;
    color: #a1a1aa;
    letter-spacing: 0.3px;
    margin-bottom: 72px;
    text-align: center;
    line-height: 1.4;
  }

  .tagline strong {
    color: #F7931A;
    font-weight: 500;
  }

  .stats-row {
    display: flex;
    gap: 24px;
    margin-bottom: 72px;
  }

  .stat-card {
    text-align: center;
    padding: 32px 48px;
    border-radius: 12px;
    border: 1px solid #27272a;
    background: rgba(24,24,27,0.5);
    min-width: 220px;
  }

  .stat-value {
    font-size: 48px;
    font-weight: 700;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    margin-bottom: 8px;
  }

  .stat-value.green { color: #22C55E; }
  .stat-value.orange { color: #F7931A; }
  .stat-value.white { color: #f4f4f5; }

  .stat-label {
    font-size: 14px;
    font-weight: 400;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .built-on {
    position: absolute;
    bottom: 56px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 16px;
    color: #71717a;
    font-weight: 400;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    padding: 8px 20px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    background: rgba(247,147,26,0.1);
    color: #F7931A;
    border: 1px solid rgba(247,147,26,0.2);
    font-family: 'JetBrains Mono', monospace;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #3f3f46;
  }
</style>
</head>
<body>
  <img src="../public/logo.png" alt="Predix" class="logo" />

  <div class="tagline">
    The first <strong>agent-native</strong> prediction market on Bitcoin.
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value white">60s</div>
      <div class="stat-label">Round Duration</div>
    </div>
    <div class="stat-card">
      <div class="stat-value green">$0</div>
      <div class="stat-label">Gas Fees</div>
    </div>
    <div class="stat-card">
      <div class="stat-value orange">100%</div>
      <div class="stat-label">On-Chain</div>
    </div>
  </div>

  <div class="built-on">
    <span>Built on</span>
    <div class="badge">Stacks</div>
    <div class="dot"></div>
    <div class="badge">Finality on Bitcoin</div>
  </div>
</body>
</html>
