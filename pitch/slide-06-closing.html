<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>Predix - Closing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #09090b;
    color: #f4f4f5;
    font-family: 'Outfit', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .logo {
    height: 72px;
    margin-bottom: 40px;
    object-fit: contain;
    clip-path: inset(10% 0);
  }

  .closing-text {
    font-size: 26px;
    font-weight: 300;
    color: #a1a1aa;
    text-align: center;
    line-height: 1.5;
    max-width: 700px;
    margin-bottom: 56px;
  }

  .features-row {
    display: flex;
    gap: 40px;
    margin-bottom: 56px;
  }

  .feature {
    text-align: center;
    padding: 24px 32px;
    border-radius: 12px;
    border: 1px solid #27272a;
    background: rgba(24,24,27,0.5);
    min-width: 140px;
  }

  .feature-value {
    font-size: 32px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: #f4f4f5;
    margin-bottom: 4px;
  }

  .feature-label {
    font-size: 12px;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .links {
    display: flex;
    gap: 24px;
    margin-bottom: 48px;
  }

  .link-card {
    padding: 20px 36px;
    border-radius: 12px;
    border: 1px solid #27272a;
    background: rgba(24,24,27,0.5);
    text-align: center;
    min-width: 240px;
  }

  .link-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #71717a;
    margin-bottom: 6px;
  }

  .link-url {
    font-size: 17px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: #F7931A;
  }

  .footer {
    position: absolute;
    bottom: 48px;
    font-size: 14px;
    color: #3f3f46;
    font-weight: 400;
  }
</style>
</head>
<body>
  <img src="../public/logo.png" alt="Predix" class="logo" />

  <div class="closing-text">
    A production-grade prediction market with a complete<br/>
    agent platform. Live on Stacks testnet.
  </div>

  <div class="features-row">
    <div class="feature">
      <div class="feature-value">3</div>
      <div class="feature-label">Smart Contracts</div>
    </div>
    <div class="feature">
      <div class="feature-value">10</div>
      <div class="feature-label">API Endpoints</div>
    </div>
    <div class="feature">
      <div class="feature-value">3</div>
      <div class="feature-label">SDKs</div>
    </div>
    <div class="feature">
      <div class="feature-value">7</div>
      <div class="feature-label">MCP Tools</div>
    </div>
    <div class="feature">
      <div class="feature-value">6</div>
      <div class="feature-label">Webhook Events</div>
    </div>
  </div>

  <div class="links">
    <div class="link-card">
      <div class="link-label">Live Demo</div>
      <div class="link-url">predix.live</div>
    </div>
    <div class="link-card">
      <div class="link-label">Source Code</div>
      <div class="link-url">github.com/LimaDevBTC/predix</div>
    </div>
    <div class="link-card">
      <div class="link-label">Agent Docs</div>
      <div class="link-url">predix.live/docs/agents</div>
    </div>
  </div>

  <div class="footer">Buidl Battle 2 -- March 2026</div>
</body>
</html>
