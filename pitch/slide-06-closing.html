<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,height=1080">
<title>Predix - Closing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    background: #09090b;
    color: #f4f4f5;
    font-family: 'Outfit', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 50% 40%, rgba(247,147,26,0.06) 0%, transparent 100%);
  }

  body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #F7931A, transparent);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 40px;
  }

  .logo-icon {
    width: 72px;
    height: 72px;
    border-radius: 18px;
    background: linear-gradient(135deg, #F7931A 0%, #E8850F 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 800;
    color: #09090b;
    letter-spacing: -2px;
    box-shadow: 0 0 80px rgba(247,147,26,0.25);
  }

  .logo-text {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #f4f4f5 0%, #a1a1aa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .closing-text {
    font-size: 28px;
    font-weight: 300;
    color: #a1a1aa;
    text-align: center;
    line-height: 1.5;
    max-width: 700px;
    margin-bottom: 64px;
  }

  .links {
    display: flex;
    gap: 32px;
    margin-bottom: 48px;
  }

  .link-card {
    padding: 24px 40px;
    border: 1px solid #27272a;
    border-radius: 12px;
    background: rgba(39,39,42,0.3);
    text-align: center;
    min-width: 240px;
  }

  .link-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #71717a;
    margin-bottom: 8px;
  }

  .link-url {
    font-size: 18px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    color: #F7931A;
  }

  .features-row {
    display: flex;
    gap: 48px;
    margin-bottom: 48px;
  }

  .feature {
    text-align: center;
  }

  .feature-value {
    font-size: 32px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: #f4f4f5;
    margin-bottom: 4px;
  }

  .feature-label {
    font-size: 13px;
    color: #71717a;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .thank-you {
    position: absolute;
    bottom: 48px;
    font-size: 16px;
    color: #52525b;
    font-weight: 400;
  }

  .corner {
    position: absolute;
    width: 40px;
    height: 40px;
  }
  .corner-tl { top: 40px; left: 40px; border-top: 2px solid #27272a; border-left: 2px solid #27272a; }
  .corner-tr { top: 40px; right: 40px; border-top: 2px solid #27272a; border-right: 2px solid #27272a; }
  .corner-bl { bottom: 40px; left: 40px; border-bottom: 2px solid #27272a; border-left: 2px solid #27272a; }
  .corner-br { bottom: 40px; right: 40px; border-bottom: 2px solid #27272a; border-right: 2px solid #27272a; }
</style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="logo-area">
    <div class="logo-icon">Px</div>
    <div class="logo-text">Predix</div>
  </div>

  <div class="closing-text">
    A production-grade prediction market with a complete<br/>
    agent platform. Live on Stacks testnet.
  </div>

  <div class="features-row">
    <div class="feature">
      <div class="feature-value">3</div>
      <div class="feature-label">Smart Contracts</div>
    </div>
    <div class="feature">
      <div class="feature-value">10</div>
      <div class="feature-label">API Endpoints</div>
    </div>
    <div class="feature">
      <div class="feature-value">3</div>
      <div class="feature-label">SDKs</div>
    </div>
    <div class="feature">
      <div class="feature-value">7</div>
      <div class="feature-label">MCP Tools</div>
    </div>
    <div class="feature">
      <div class="feature-value">6</div>
      <div class="feature-label">Webhook Events</div>
    </div>
  </div>

  <div class="links">
    <div class="link-card">
      <div class="link-label">Live Demo</div>
      <div class="link-url">predix.live</div>
    </div>
    <div class="link-card">
      <div class="link-label">Source Code</div>
      <div class="link-url">github.com/prdx-live/predix</div>
    </div>
    <div class="link-card">
      <div class="link-label">Agent Docs</div>
      <div class="link-url">predix.live/docs/agents</div>
    </div>
  </div>

  <div class="thank-you">Buidl Battle 2 -- March 2026</div>
</body>
</html>
