<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1500">
<title>Predix — X Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  .banner {
    width: 1500px;
    height: 500px;
    background: linear-gradient(145deg, #09090b 0%, #0f0f12 40%, #18181b 60%, #0f0f12 80%, #09090b 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
  }

  /* Subtle grid */
  .grid-bg {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      linear-gradient(rgba(244,244,245,0.4) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244,244,245,0.4) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Green glow — top right */
  .glow-green {
    position: absolute;
    top: -120px;
    right: 180px;
    width: 450px;
    height: 450px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34,197,94,0.12) 0%, rgba(34,197,94,0.04) 40%, transparent 70%);
    filter: blur(30px);
  }

  /* Red glow — bottom left */
  .glow-red {
    position: absolute;
    bottom: -120px;
    left: 180px;
    width: 450px;
    height: 450px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(239,68,68,0.12) 0%, rgba(239,68,68,0.04) 40%, transparent 70%);
    filter: blur(30px);
  }

  /* Bitcoin subtle accent glow */
  .glow-btc {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(247,147,26,0.03) 0%, transparent 70%);
    filter: blur(40px);
  }

  /* Horizontal accent lines */
  .line-top {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(34,197,94,0.3) 30%, rgba(247,147,26,0.2) 50%, rgba(239,68,68,0.3) 70%, transparent);
  }

  .line-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(239,68,68,0.3) 30%, rgba(247,147,26,0.2) 50%, rgba(34,197,94,0.3) 70%, transparent);
  }

  /* Main content layout */
  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* Logo */
  .logo-img {
    height: 140px;
    width: auto;
    margin-bottom: 4px;
    filter: drop-shadow(0 0 60px rgba(255,255,255,0.03));
  }

  /* Tagline */
  .tagline {
    font-size: 28px;
    font-weight: 500;
    color: #a1a1aa;
    letter-spacing: 0.5px;
  }

  /* UP / DOWN badges */
  .badges {
    display: flex;
    gap: 16px;
    margin-top: 16px;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 22px;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }

  .badge-up {
    color: #22C55E;
    background: rgba(34,197,94,0.10);
    border: 1px solid rgba(34,197,94,0.25);
  }

  .badge-down {
    color: #EF4444;
    background: rgba(239,68,68,0.10);
    border: 1px solid rgba(239,68,68,0.25);
  }

  .tri-up {
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-bottom: 10px solid #22C55E;
  }

  .tri-down {
    width: 0; height: 0;
    border-left: 7px solid transparent;
    border-right: 7px solid transparent;
    border-top: 10px solid #EF4444;
  }

  /* Bottom bar */
  .bottom-bar {
    position: absolute;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    color: #52525b;
    font-weight: 500;
    z-index: 10;
  }

  .bottom-bar .sep {
    color: #3f3f46;
  }

  .bottom-bar .highlight {
    color: #71717a;
  }

  /* Animated price line SVG */
  .price-line-container {
    position: absolute;
    bottom: 50px;
    left: 0;
    right: 0;
    height: 160px;
    opacity: 0.06;
    z-index: 1;
  }

  .price-line-container svg {
    width: 100%;
    height: 100%;
  }

  /* Decorative dots */
  .dot-pattern {
    position: absolute;
    top: 30px;
    right: 60px;
    display: grid;
    grid-template-columns: repeat(6, 8px);
    gap: 12px;
    opacity: 0.08;
    z-index: 1;
  }

  .dot-pattern .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #f4f4f5;
  }

  .dot-pattern-left {
    position: absolute;
    bottom: 60px;
    left: 60px;
    display: grid;
    grid-template-columns: repeat(4, 8px);
    gap: 12px;
    opacity: 0.06;
    z-index: 1;
  }

  .dot-pattern-left .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #f4f4f5;
  }

  /* Stacks badge */
  .stacks-badge {
    position: absolute;
    top: 20px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 12px;
    font-weight: 600;
    color: #71717a;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.5px;
    z-index: 10;
  }

  .stacks-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #F7931A;
  }

  /* BTC ticker */
  .btc-ticker {
    position: absolute;
    top: 20px;
    left: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: #52525b;
    z-index: 10;
  }

  .btc-ticker .btc-symbol {
    color: #F7931A;
    font-size: 15px;
  }

  .btc-ticker .price {
    color: #71717a;
  }

  .btc-ticker .change {
    color: #22C55E;
    font-size: 12px;
  }
</style>
